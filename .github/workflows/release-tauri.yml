name: Release Tauri

on:
  push:
    tags:
      - "tauri-v*"

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
          env: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: voicelite-tauri/src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: voicelite-tauri
        run: bun install

      - name: Copy whisper model
        working-directory: voicelite-tauri
        run: |
          mkdir -p src-tauri/resources/models
          # ggml-base.bin must be provided as a release asset or cached
          # For CI, download from HuggingFace if not cached
          if [ ! -f src-tauri/resources/models/ggml-base.bin ]; then
            curl -L -o src-tauri/resources/models/ggml-base.bin \
              https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin
          fi
        shell: bash

      - name: Copy VAD model
        working-directory: voicelite-tauri
        run: |
          if [ ! -f src-tauri/resources/models/silero_vad_v5.onnx ]; then
            curl -L -o src-tauri/resources/models/silero_vad_v5.onnx \
              https://github.com/snakers4/silero-vad/raw/master/src/silero_vad/data/silero_vad.onnx
          fi
        shell: bash

      - name: Build Tauri app
        working-directory: voicelite-tauri
        run: bun tauri build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/tauri-v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoiceLite Tauri v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            voicelite-tauri/src-tauri/target/release/bundle/nsis/*.exe
            voicelite-tauri/src-tauri/target/release/bundle/nsis/*.exe.sig
            voicelite-tauri/src-tauri/target/release/bundle/nsis/latest.json
          generate_release_notes: true
